bundle:
  name: carepilot

sync:
  exclude:
    - dh_EDA.ipynb.ipynb
    - node_modules/**
    - .git/**
    - client/dist/**
    - dist/**

variables:
  genie_space_id:
    description: CarePilot Genie space ID for healthcare data queries
  genie_space_name:
    description: CarePilot Genie space display name

resources:
  apps:
    app:
      name: 'carepilot'
      description: 'Healthcare data queries via Genie and Unity Catalog'
      user_api_scopes:
        - dashboards.genie
        - sql
        - iam.current-user:read
        - iam.access-control:read
      source_code_path: ./
      resources:
        - name: genie-space
          genie_space:
            name: ${var.genie_space_name}
            space_id: ${var.genie_space_id}
            permission: CAN_RUN

targets:
  default:
    default: true
    variables:
      genie_space_id: 01f16954e5791df78bb099133a0041be
      genie_space_name: CarePilot Healthcare Data
