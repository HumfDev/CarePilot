bundle:
  name: carepilot

sync:
  exclude:
    - dh_EDA.ipynb.ipynb
    - node_modules/**
    - .git/**
    - .env
    - client/dist/**
    - dist/**

variables:
  postgres_branch:
    description: Lakebase Postgres branch resource name for carepilot-db
  postgres_database:
    description: Lakebase Postgres database resource name for carepilot-db
  genie_space_id:
    description: CarePilot Genie space ID for healthcare data queries
  genie_space_name:
    description: CarePilot Genie space display name
  sql_warehouse_id:
    description: SQL warehouse used by Genie (Serverless Starter Warehouse)
  serving_endpoint_name:
    description: Foundation Model serving endpoint for referral summaries

resources:
  apps:
    app:
      name: 'carepilot'
      description: 'Healthcare data queries via Genie, Lakebase, and Unity Catalog'
      user_api_scopes:
        - dashboards.genie
        - sql
        - postgres
      resources:
        - name: postgres
          postgres:
            branch: ${var.postgres_branch}
            database: ${var.postgres_database}
            permission: CAN_CONNECT_AND_CREATE
        - name: genie-space
          genie_space:
            name: ${var.genie_space_name}
            space_id: ${var.genie_space_id}
            permission: CAN_RUN
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: serving-endpoint
          serving_endpoint:
            name: ${var.serving_endpoint_name}
            permission: CAN_QUERY

targets:
  default:
    default: true
    variables:
      postgres_branch: projects/carepilot-db/branches/production
      postgres_database: projects/carepilot-db/branches/production/databases/databricks-postgres
      genie_space_id: 01f16954e5791df78bb099133a0041be
      genie_space_name: CarePilot Healthcare Data
      sql_warehouse_id: b2bb07abff382b79
      serving_endpoint_name: databricks-llama-4-maverick
    resources:
      apps:
        app:
          source_code_path: ./

  # Workspace dbc-7bc68df0-b635 (7474654406105854).
  # Git-backed app: HumfDev/CarePilot main
  # Set profile: export DATABRICKS_CONFIG_PROFILE=dbc-7bc68df0-b635
